<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>1·4·7·14 복습 플래너</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

    :root {
      --bg:       #ffffff;
      --card:     #fffdf0;
      --card2:    #fff8d4;
      --yellow:   #f5d020;
      --yellow-l: #fff0b8;
      --yellow-m: #ffe780;
      --yellow-d: #c9a800;
      --green:    #7aba5a;
      --green-l:  #d6eeb0;
      --green-m:  #a8d880;
      --green-d:  #4a7a30;
      --sage:     #b8d4a0;
      --sage-l:   #e8f4dc;
      --brown:    #3a3020;
      --brown-m:  #6a5c40;
      --brown-l:  #b0a080;
      --border:   #e0d890;
      --border-d: #c8c070;
      --red-l:    #fdecea;
      --red:      #c97070;
      --blue-l:   #eaf0fb;
      --blue:     #6a90c4;
      --nav-h: 62px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--brown);
      display: flex; flex-direction: column;
      padding-bottom: var(--nav-h);
    }

    /* ══ 동기화 상태 배너 ══ */
    .sync-banner {
      background: #e8f4dc; border-bottom: 1px solid #b0d880;
      padding: 6px 16px; font-size: 11px;
      display: flex; align-items: center; gap: 6px;
      color: #3a6020; min-height: 28px;
    }
    .sync-banner.error { background: #fdecea; border-color: #ecbcbc; color: #c97070; }
    .sync-banner.loading { background: #fff8d4; border-color: #f5d020; color: #8a6000; }
    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #7aba5a;
    }
    .sync-banner.error .sync-dot { background: #c97070; }
    .sync-banner.loading .sync-dot { background: #f5d020; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ══ 헤더 ══ */
    .app-header {
      background: #fff0b8;
      padding: 18px 16px 22px;
      position: sticky; top:0; z-index:200;
      box-shadow: 0 2px 10px rgba(200,180,60,.15);
      border-bottom: 1.5px solid #f0d870;
    }
    .header-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
    .header-left h1 {
      font-size: 20px; font-weight: 900;
      color: #3a3010; letter-spacing: -.3px;
    }
    .header-left p { font-size: 11px; color: #6a5a20; margin-top: 3px; opacity:.85; }
    .header-actions { display:flex; gap:7px; }
    .icon-btn {
      background: rgba(255,255,255,.6);
      border: 1px solid #e8c840;
      color: #3a3010; border-radius: 8px;
      padding: 6px 11px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .icon-btn:hover { background: rgba(255,255,255,.8); }

    .progress-info { display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px; color:#3a3010; opacity:.9; }
    .progress-bar-bg { background:rgba(255,255,255,.5); border-radius:20px; height:7px; overflow:hidden; border:1px solid #e8c840; }
    .progress-bar-fill { height:100%; border-radius:20px; background:#f5d020; transition:width .5s; }

    /* ══ 데스크탑 탭 ══ */
    .desktop-tabs { display:none; }
    @media(min-width:768px){
      body { padding-bottom:0; }
      .bottom-nav { display:none !important; }
      .desktop-tabs {
        display: flex !important;
        background: var(--card);
        border-bottom: 2px solid var(--border);
        position: sticky; top:78px; z-index:150;
      }
      .dtab {
        padding:12px 22px; border:none; background:none;
        font-size:13px; font-weight:600; color:var(--brown-m);
        cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px;
        transition:all .2s;
      }
      .dtab.active { color:#4a7a30; border-bottom-color:#7aba5a; }
      .dtab:hover:not(.active) { color:var(--brown); background:#e8f4dc; }
    }

    /* ══ 하단 네비 ══ */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      height:var(--nav-h); z-index:300;
      background: #fffdf0;
      border-top: 1.5px solid var(--border);
      display:flex; align-items:stretch;
      box-shadow: 0 -2px 10px rgba(100,100,40,.1);
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:3px;
      border:none; background:none; cursor:pointer;
      color:var(--brown-l); font-size:10px; font-weight:600;
      transition:color .2s;
    }
    .nav-btn .nav-icon { font-size:20px; line-height:1; }
    .nav-btn.active { color:var(--green-d); }

    /* ══ 메인 ══ */
    .main { flex:1; overflow-y:auto; padding:14px; max-width:640px; margin:0 auto; width:100%; }

    /* ══ 주차 구분 ══ */
    .week-divider { display:flex; align-items:center; gap:8px; margin:20px 0 10px; }
    .wdl { flex:1; height:1px; background:var(--border); }
    .wdlabel {
      font-size:11px; font-weight:700; color:var(--green-d);
      background:#d6eeb0; padding:3px 12px; border-radius:20px; white-space:nowrap;
      border: 1px solid #b8d890;
    }

    /* ══ 데이 카드 ══ */
    .day-card {
      background: #fffdf0;
      border-radius: 14px; margin-bottom:10px;
      border: 1.5px solid #e8e090;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(100,90,40,.07);
      transition: border-color .2s, box-shadow .2s;
    }
    .day-card.completed { border-color:#a8d880; box-shadow:0 2px 10px rgba(120,186,90,.2); }
    .day-card.partial   { border-color:#f5d020; box-shadow:0 2px 10px rgba(245,208,32,.2); }

    .day-header {
      display:flex; align-items:center; gap:10px;
      padding:12px 14px; cursor:pointer;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .day-header:active { background:#f0f8e0; }

    .day-num-badge {
      width:38px; height:38px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:14px; flex-shrink:0;
    }
    .w1 { background:#fff0b8; color:#8a6a00; border:1px solid #f5d878; }
    .w2 { background:#d6eeb0; color:#4a7a30; border:1px solid #b0d888; }
    .w3 { background:#e8f4dc; color:#4a6a40; border:1px solid #c0d8a0; }
    .w4 { background:#fff8d4; color:#8a7020; border:1px solid #e8d878; }
    .w5 { background:#d6eeb0; color:#2a5a28; border:1px solid #a0c878; }

    .day-info { flex:1; min-width:0; }
    .day-title { font-size:14px; font-weight:700; }
    .day-sub   { font-size:11px; color:var(--brown-m); margin-top:1px; }
    .day-status-icon { font-size:18px; flex-shrink:0; }
    .chevron { font-size:11px; color:var(--brown-l); transition:transform .2s; flex-shrink:0; }
    .day-card.open .chevron { transform:rotate(180deg); }

    .day-body { display:none; padding:0 14px 14px; border-top:1.5px solid var(--border); }
    .day-card.open .day-body { display:block; }

    .section-label {
      font-size:10px; font-weight:700; color:var(--brown-m);
      letter-spacing:.6px; text-transform:uppercase;
      margin:13px 0 7px; display:flex; align-items:center; gap:6px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ══ 태스크 아이템 ══ */
    .task-item {
      display:flex; align-items:center; gap:9px;
      padding:11px 12px; border-radius:10px; margin-bottom:5px;
      border:1.5px solid #e8e090; cursor:pointer;
      background:#fffef5; transition:all .15s;
      min-height:44px; -webkit-tap-highlight-color:transparent;
    }
    .task-item:active { background:#fff0b8; }
    .task-item.done   { background:#d6eeb0; border-color:#a8d880; }

    .task-checkbox {
      width:22px; height:22px; border-radius:7px;
      border:2px solid #c8c070;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all .15s; font-size:12px; font-weight:700;
    }
    .task-item.done .task-checkbox { background:#7aba5a; border-color:#7aba5a; color:#fff; }

    .task-text { font-size:13px; font-weight:500; flex:1; line-height:1.4; }
    .task-item.done .task-text { text-decoration:line-through; color:var(--brown-m); }

    .task-badge {
      font-size:10px; font-weight:700; padding:2px 8px;
      border-radius:20px; flex-shrink:0;
    }
    .b-new  { background:#ffe780; color:#6a5000; border:1px solid #f5d020; }
    .b-r1   { background:#fff0b8; color:#8a6a00; border:1px solid #f5d020; }
    .b-r2   { background:#d6eeb0; color:#3a6020; border:1px solid #a8d880; }
    .b-r3   { background:#c8e8a0; color:#2a5018; border:1px solid #90c870; }
    .b-morn { background:#e8f4dc; color:#3a6030; border:1px solid #b0d888; }
    .b-bed  { background:#f0f8e0; color:#3a5830; border:1px solid #c0d8a0; }

    /* ══ 루틴 아이템 ══ */
    .routine-item {
      display:flex; align-items:center; gap:9px;
      padding:11px 12px; border-radius:10px; margin-bottom:5px;
      border:1.5px solid; cursor:pointer; min-height:44px;
      transition:all .15s; -webkit-tap-highlight-color:transparent;
    }
    .routine-item.morning         { background:#e8f8e0; border-color:#b0d890; }
    .routine-item.morning.done    { background:#d0eeb8; border-color:#90c870; }
    .routine-item.bed             { background:#fff8d4; border-color:#e8d870; }
    .routine-item.bed.done        { background:#fff0b8; border-color:#f0c840; }
    .routine-item:active          { opacity:.8; }

    .r-icon   { font-size:17px; flex-shrink:0; }
    .r-text   { font-size:12px; font-weight:600; flex:1; line-height:1.4; color:var(--brown); }
    .routine-item.done .r-text { text-decoration:line-through; opacity:.65; }

    .routine-check {
      width:22px; height:22px; border-radius:7px;
      border:2px solid rgba(0,0,0,.12);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; font-size:12px; font-weight:700;
      transition:all .15s;
    }
    .routine-item.morning.done .routine-check,
    .routine-item.bed.done     .routine-check {
      background:#7aba5a; border-color:#7aba5a; color:#fff;
    }

    /* ══ 메모 ══ */
    .memo-wrap { margin-top:12px; }
    .memo-textarea {
      width:100%; min-height:82px;
      border:1.5px solid #e0d880; border-radius:10px;
      padding:10px 12px;
      font-family:'Noto Sans KR',sans-serif; font-size:13px;
      color:var(--brown); resize:vertical; background:#fffef5;
      transition:border-color .2s; line-height:1.6;
    }
    .memo-textarea::placeholder { color:var(--brown-l); }
    .memo-textarea:focus {
      outline:none; border-color:#a8d880; background:#fff;
      box-shadow:0 0 0 3px rgba(168,216,128,.2);
    }
    .memo-footer { display:flex; align-items:center; gap:8px; margin-top:7px; }
    .memo-save-btn {
      padding:8px 16px; background:#7aba5a; color:#fff;
      border:none; border-radius:8px; font-size:12px; font-weight:700;
      cursor:pointer; transition:background .2s; min-height:36px;
    }
    .memo-save-btn:hover { background:#4a7a30; }
    .memo-saved { color:#4a7a30; font-size:12px; display:none; font-weight:600; }
    .memo-count { font-size:11px; color:var(--brown-l); margin-left:auto; }

    /* ══ Unit 이름 인라인 편집 ══ */
    .unit-edit-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; padding: 2px 5px; border-radius: 5px;
      color: var(--brown-l); transition: color .15s, background .15s;
      flex-shrink: 0; line-height: 1;
    }
    .unit-edit-btn:hover { color: var(--green-d); background: #e8f4dc; }
    .unit-name-wrap {
      display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0;
    }
    .unit-name-input {
      flex: 1; padding: 4px 8px;
      border: 1.5px solid #7aba5a; border-radius: 6px;
      font-size: 13px; font-family: inherit; outline: none;
      background: #fff; min-width: 0;
    }
    .unit-confirm-btn {
      padding: 4px 10px; background: #7aba5a; color: #fff;
      border: none; border-radius: 6px; font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .unit-confirm-btn:hover { background: #4a7a30; }
    .unit-custom-badge {
      font-size: 9px; font-weight: 700; padding: 1px 6px;
      border-radius: 10px; background: #e8f4dc; color: #3a6020;
      border: 1px solid #b0d888; flex-shrink: 0; white-space: nowrap;
    }

    /* ══ 통계 ══ */
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .streak-card {
      background:#d6eeb0;
      border-radius:16px; padding:22px; color:#2a3a18;
      text-align:center; grid-column:span 2;
      box-shadow:0 2px 10px rgba(100,160,60,.15);
      border: 1.5px solid #b0d880;
    }
    .streak-card .snum   { font-size:48px; font-weight:900; line-height:1; }
    .streak-card .slabel { font-size:12px; opacity:.8; margin-top:5px; font-weight:600; }

    .stat-card {
      background:#fffdf0; border-radius:14px;
      padding:16px; text-align:center;
      box-shadow:0 2px 8px rgba(100,90,40,.07);
      border:1.5px solid #e8e090;
    }
    .stat-card .snum  { font-size:28px; font-weight:900; color:#4a7a30; }
    .stat-card .slabel{ font-size:11px; color:var(--brown-m); margin-top:3px; }

    /* 동기화 상태 카드 */
    .sync-status-card {
      background:#fffdf0; border-radius:14px;
      padding:16px; margin-bottom:12px;
      border:1.5px solid #e8e090;
      box-shadow:0 2px 8px rgba(100,90,40,.07);
    }
    .sync-status-card h3 { font-size:13px; font-weight:700; margin-bottom:10px; }
    .sync-row { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--brown-m); }
    .sync-indicator {
      display:inline-flex; align-items:center; gap:5px;
      font-size:12px; font-weight:600;
      padding:4px 10px; border-radius:20px;
    }
    .sync-indicator.ok    { background:#d6eeb0; color:#3a6020; }
    .sync-indicator.err   { background:#fdecea; color:#c97070; }
    .sync-indicator.wait  { background:#fff8d4; color:#8a6000; }

    /* 데이터 관리 */
    .data-section {
      background:#fffdf0; border-radius:14px;
      padding:16px; box-shadow:0 2px 8px rgba(100,90,40,.07);
      margin-bottom:12px; border:1.5px solid #e8e090;
    }
    .data-section h3 { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--brown); }
    .data-btn-row { display:flex; gap:8px; flex-wrap:wrap; }
    .data-btn {
      flex:1; min-width:110px; padding:10px 12px; border-radius:10px;
      font-size:12px; font-weight:600; cursor:pointer;
      border:1.5px solid; transition:all .2s; min-height:40px;
    }
    .btn-export { background:#fff0b8; color:#6a5000; border-color:#f5d020; }
    .btn-export:hover { background:#ffe780; }
    .btn-import { background:#d6eeb0; color:#3a6020; border-color:#a8d880; }
    .btn-import:hover { background:#c0e098; }
    .btn-reset  { background:var(--red-l); color:var(--red); border-color:#ECBCBC; }
    .btn-reset:hover { background:#FBDDDD; }
    .sync-note {
      font-size:11px; color:var(--brown-m); line-height:1.7;
      margin-top:10px; padding:10px 12px;
      background:#e8f4dc; border-radius:8px;
      border-left:3px solid #a8d880;
    }

    /* ══ 달력 ══ */
    .cal-card {
      background:#fffdf0; border-radius:14px; padding:16px;
      box-shadow:0 2px 8px rgba(100,90,40,.07);
      border:1.5px solid #e8e090;
    }
    .cal-card h3 { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--brown); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
    .cal-hcell { text-align:center; font-size:10px; font-weight:700; color:var(--brown-m); padding:3px 0; }
    .cal-cell {
      aspect-ratio:1; border-radius:8px;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:12px; font-weight:600; cursor:pointer;
      border:1.5px solid #e0d880; background:#fffef5;
      transition:all .15s; position:relative;
      -webkit-tap-highlight-color:transparent;
    }
    .cal-cell:active { transform:scale(.92); }
    .cal-cell.cc { background:#d6eeb0; border-color:#a8d880; color:#3a6020; }
    .cal-cell.cp { background:#fff0b8; border-color:#f5d020; color:#8a6a00; }
    .cal-cell.ce { background:#fffef5; color:#b0a080; }
    .cal-dot { width:4px; height:4px; border-radius:50%; background:#4a7a30; position:absolute; bottom:4px; }
    .cal-legend { display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; }
    .cal-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--brown-m); }
    .cal-legend-dot  { width:11px; height:11px; border-radius:3px; border:1px solid; }

    /* ══ 탭 패널 ══ */
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ══ Toast ══ */
    .toast {
      position:fixed; bottom:calc(var(--nav-h)+12px); left:50%;
      transform:translateX(-50%);
      background:var(--brown); color:#FFF8E0;
      padding:9px 18px; border-radius:30px;
      font-size:12px; font-weight:500;
      opacity:0; pointer-events:none; transition:opacity .3s;
      z-index:9999; white-space:nowrap;
    }
    .toast.show { opacity:1; }

    @media(min-width:480px){
      .main { padding:16px; }
      .app-header { padding:20px 20px 24px; }
      .header-left h1 { font-size:22px; }
    }
    @media(min-width:640px){
      .stats-grid { grid-template-columns:repeat(4,1fr); }
      .streak-card { grid-column:span 4; }
      .data-btn-row { flex-wrap:nowrap; }
    }
  </style>
</head>
<body>

<!-- ══ 동기화 상태 배너 ══ -->
<div class="sync-banner loading" id="sync-banner">
  <div class="sync-dot"></div>
  <span id="sync-msg">Firebase 연결 중...</span>
</div>

<!-- ══ 헤더 ══ -->
<div class="app-header">
  <div class="header-top">
    <div class="header-left">
      <h1>🌿 1·4·7·14 복습 플래너</h1>
      <p>공부한 날 기준 +3일 · +6일 · +13일 복습</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="manualSync()">🔄 동기화</button>
      <button class="icon-btn" onclick="exportData()">📤 백업</button>
    </div>
  </div>
  <div class="progress-info">
    <span id="prog-text">전체 진행률</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
  </div>
</div>

<!-- ══ 데스크탑 탭 ══ -->
<div class="desktop-tabs">
  <button class="dtab active"  onclick="switchTab('plan',this)">📅 30일 계획</button>
  <button class="dtab"         onclick="switchTab('stats',this)">📊 통계</button>
  <button class="dtab"         onclick="switchTab('calendar',this)">🗓 달력</button>
</div>

<!-- ══ 메인 ══ -->
<div class="main">

  <!-- 계획 탭 -->
  <div class="tab-panel active" id="tab-plan">
    <div id="day-list"></div>
  </div>

  <!-- 통계 탭 -->
  <div class="tab-panel" id="tab-stats">
    <!-- 동기화 상태 카드 -->
    <div class="sync-status-card">
      <h3>🔥 Firebase 동기화 상태</h3>
      <div class="sync-row">
        <span id="sync-indicator-badge" class="sync-indicator wait">⏳ 연결 중</span>
        <span id="sync-last-time" style="font-size:11px;color:var(--brown-l)"></span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="streak-card">
        <div class="snum" id="s-streak">0</div>
        <div class="slabel">🔥 연속 완료 일수 (스트릭)</div>
      </div>
      <div class="stat-card"><div class="snum" id="s-done">0</div><div class="slabel">완료된 날</div></div>
      <div class="stat-card"><div class="snum" id="s-tasks">0</div><div class="slabel">완료 태스크</div></div>
      <div class="stat-card"><div class="snum" id="s-memos">0</div><div class="slabel">작성 메모</div></div>
      <div class="stat-card"><div class="snum" id="s-remain">30</div><div class="slabel">남은 일수</div></div>
    </div>
    <div class="data-section">
      <h3>💾 데이터 관리</h3>
      <div class="data-btn-row">
        <button class="data-btn btn-export" onclick="exportData()">📤 JSON 백업</button>
        <button class="data-btn btn-import" onclick="triggerImport()">📥 JSON 복원</button>
        <button class="data-btn btn-reset"  onclick="confirmReset()">🗑 전체 초기화</button>
      </div>
      <div class="sync-note">
        🔥 <strong>Firebase 실시간 동기화 활성화됨</strong><br>
        폰 ↔ PC 자동 동기화 · 앱을 열 때마다 최신 데이터 로드<br>
        네트워크 없을 때는 로컬 캐시로 작동 후 복구 시 자동 업로드
      </div>
    </div>
  </div>

  <!-- 달력 탭 -->
  <div class="tab-panel" id="tab-calendar">
    <div class="cal-card">
      <h3>🌿 30일 완료 현황</h3>
      <div class="cal-grid" id="cal-h"></div>
      <div class="cal-grid" id="cal-g" style="margin-top:5px;"></div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#d6eeb0;border-color:#a8d880"></div>완료</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fff0b8;border-color:#f5d020"></div>일부</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fffef5;border-color:#e0d880"></div>미완료</div>
        <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#d6eeb0;border-color:#4a7a30"></div>메모있음 ●</div>
      </div>
    </div>
  </div>

</div>

    <span class="nav-icon">📅</span>30일 계획
  </button>
  <button class="nav-btn"        id="nb-stats"    onclick="switchTab('stats',null,'nb-stats')">
    <span class="nav-icon">📊</span>통계
  </button>
  <button class="nav-btn"        id="nb-calendar" onclick="switchTab('calendar',null,'nb-calendar')">
    <span class="nav-icon">🗓</span>달력
  </button>

<div class="toast" id="toast"></div>

<!-- ══ Firebase SDK ══ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  // ── Firebase 설정 ─────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBkfoU4ArZgBjsfWCDlM52v-zlKNTBA-zs",
    authDomain: "study-planner-f598e.firebaseapp.com",
    projectId: "study-planner-f598e",
    storageBucket: "study-planner-f598e.firebasestorage.app",
    messagingSenderId: "530169128885",
    appId: "1:530169128885:web:ac6be21821d7a3bcfcdbfc"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── 문서 경로: users/default/data ─────────────────
  // 계정 없이 단일 사용자 모드로 동작
  const DATA_DOC = doc(db, "users", "default");

  // ── 30일 데이터 구조 (unitNum + suffix 방식) ────────────────────
  const DAYS = (() => {
    const days = [];
    for (let d = 1; d <= 30; d++) {
      const tasks = [];
      if (d > 1) tasks.push({ id:`d${d}_morn`, type:'morn', unitNum:d-1,  suffix:'전날 복습 확인' });
      tasks.push(          { id:`d${d}_new`,  type:'new',  unitNum:d,    suffix:'새 진도 나가기' });
      if (d-3  >= 1) tasks.push({ id:`d${d}_r1`, type:'r1', unitNum:d-3,  suffix:'1차 복습' });
      if (d-6  >= 1) tasks.push({ id:`d${d}_r2`, type:'r2', unitNum:d-6,  suffix:'2차 복습' });
      if (d-13 >= 1) tasks.push({ id:`d${d}_r3`, type:'r3', unitNum:d-13, suffix:'3차 복습' });
      tasks.push(          { id:`d${d}_bed`,  type:'bed',  unitNum:d,    suffix:'자기 전 훑기' });
      days.push({ day:d, tasks });
    }
    return days;
  })();

  // ── 상태 ─────────────────────────────────────────
  // unitNames: { 1: '수학 1단원', 2: '영어 챕터2', ... }
  let checks = {}, memos = {}, opens = {}, unitNames = {};
  let isSyncing = false;
  let unsubscribe = null;
  let lastSyncTime = null;

  // ── 로컬 캐시 (오프라인 대비) ────────────────────
  const LC = (k,v) => {
    if(v !== undefined) localStorage.setItem('sp_fb_'+k, JSON.stringify(v));
    else { const r=localStorage.getItem('sp_fb_'+k); return r ? JSON.parse(r) : null; }
  };

  // ── 배너 UI ──────────────────────────────────────
  function setSyncStatus(state, msg) {
    const banner = document.getElementById('sync-banner');
    const msgEl  = document.getElementById('sync-msg');
    const badge  = document.getElementById('sync-indicator-badge');
    banner.className = 'sync-banner ' + (state==='ok'?'':state==='err'?'error':'loading');
    if(msgEl) msgEl.textContent = msg;
    if(badge){
      badge.className = 'sync-indicator ' + (state==='ok'?'ok':state==='err'?'err':'wait');
      badge.textContent = state==='ok'?'✅ 동기화됨':state==='err'?'❌ 연결 오류':'⏳ 연결 중';
    }
    if(state==='ok'){
      lastSyncTime = new Date();
      const t = document.getElementById('sync-last-time');
      if(t) t.textContent = '마지막 동기화: ' + lastSyncTime.toLocaleTimeString('ko-KR');
    }
  }

  // ── Unit 이름 헬퍼 ──────────────────────────────────────────────
  function getUnitName(n) {
    return (unitNames && unitNames[n]) ? unitNames[n] : `Unit ${n}`;
  }
  function getTaskLabel(t) {
    return `${getUnitName(t.unitNum)} ${t.suffix}`;
  }

  // ── Firestore에 저장 ─────────────────────────────
  async function saveToFirestore() {
    if(isSyncing) return;
    isSyncing = true;
    try {
      await setDoc(DATA_DOC, {
        checks, memos, opens, unitNames,
        updatedAt: serverTimestamp()
      });
      LC('checks', checks); LC('memos', memos); LC('opens', opens); LC('unitNames', unitNames);
      setSyncStatus('ok', '✅ Firebase에 저장됨');
      showToast('☁️ 저장됨');
    } catch(e) {
      console.error('Firebase 저장 오류:', e);
      LC('checks', checks); LC('memos', memos); LC('opens', opens); LC('unitNames', unitNames);
      setSyncStatus('err', '❌ 오프라인 – 로컬에 임시 저장됨');
    } finally {
      isSyncing = false;
    }
  }

  // ── 실시간 리스너 ────────────────────────────────
  function startListener() {
    if(unsubscribe) unsubscribe();
    setSyncStatus('loading', 'Firebase 연결 중...');
    unsubscribe = onSnapshot(DATA_DOC,
      (snap) => {
        if(snap.exists()){
          const data = snap.data();
          checks    = data.checks    || {};
          memos     = data.memos     || {};
          opens     = data.opens     || {};
          unitNames = data.unitNames || {};
          LC('checks', checks); LC('memos', memos); LC('opens', opens); LC('unitNames', unitNames);
        }
        setSyncStatus('ok', '✅ 실시간 동기화 중');
        renderDays(); updateStats(); updateCalendar();
      },
      (err) => {
        console.warn('Firestore 실시간 오류:', err);
        setSyncStatus('err', '❌ 연결 끊김 – 로컬 캐시 사용 중');
        // 로컬 캐시 사용
        const cc = LC('checks'); const mm = LC('memos'); const oo = LC('opens'); const un = LC('unitNames');
        if(cc) checks=cc; if(mm) memos=mm; if(oo) opens=oo; if(un) unitNames=un;
        renderDays(); updateStats(); updateCalendar();
      }
    );
  }

  // ── 수동 동기화 ──────────────────────────────────
  window.manualSync = async function() {
    setSyncStatus('loading','수동 동기화 중...');
    try {
      const snap = await getDoc(DATA_DOC);
      if(snap.exists()){
        const data=snap.data();
        checks=data.checks||{}; memos=data.memos||{}; opens=data.opens||{}; unitNames=data.unitNames||{};
        LC('checks',checks); LC('memos',memos); LC('opens',opens); LC('unitNames',unitNames);
        setSyncStatus('ok','✅ 동기화 완료');
        renderDays(); updateStats(); updateCalendar();
        showToast('🔄 동기화 완료!');
      } else {
        setSyncStatus('ok','✅ 데이터 없음 (새 시작)');
        showToast('🌱 새 플래너 시작!');
      }
    } catch(e) {
      setSyncStatus('err','❌ 동기화 실패: '+e.message);
      showToast('❌ 동기화 실패');
    }
  };

  // ── 헬퍼 ─────────────────────────────────────────
  const wc   = d => (['','w1','w2','w3','w4','w5'][Math.ceil(d/7)])||'w5';
  const wlb  = d => (['','1주차','2주차','3주차','4주차','5주차'][Math.ceil(d/7)])||'5주차';
  const wdlb = d => (['','1주차 (Day 1–7)','2주차 (Day 8–14)','3주차 (Day 15–21)','4주차 (Day 22–28)','5주차 (Day 29–30)'][Math.ceil(d/7)])||'5주차';
  const isRoutine = t => ['bed','morn'].includes(t.type);
  const mainTasks = day => day.tasks.filter(t=>!isRoutine(t));

  function getDayStatus(day){
    const mt=mainTasks(day);
    const done=mt.filter(t=>checks[t.id]).length;
    if(done===0) return 'empty';
    if(done===mt.length) return 'complete';
    return 'partial';
  }

  // ── 렌더 ─────────────────────────────────────────
  function renderDays(){
    const list=document.getElementById('day-list');
    let html='', lastW=0;
    DAYS.forEach(day=>{
      const w=Math.ceil(day.day/7);
      if(w!==lastW){
        html+=`<div class="week-divider"><div class="wdl"></div>
          <div class="wdlabel">🌿 ${wdlb(day.day)}</div>
          <div class="wdl"></div></div>`;
        lastW=w;
      }
      html+=renderCard(day);
    });
    list.innerHTML=html;
    updateProgress();
  }

  function renderCard(day){
    const status=getDayStatus(day);
    const isOpen=opens[day.day]||false;
    const mt=mainTasks(day);
    const doneC=mt.filter(t=>checks[t.id]).length;
    const totalC=mt.length;
    const icon=status==='complete'?'✅':status==='partial'?'🟡':'⬜';
    const cc=status==='complete'?'completed':status==='partial'?'partial':'';
    const oc=isOpen?'open':'';

    const mornT=day.tasks.filter(t=>t.type==='morn');
    const newT =day.tasks.filter(t=>t.type==='new');
    const revT =day.tasks.filter(t=>['r1','r2','r3'].includes(t.type));
    const bedT =day.tasks.filter(t=>t.type==='bed');

    let body='';

    if(mornT.length){
      body+=`<div class="section-label">☀️ 아침 루틴</div>`;
      mornT.forEach(t=>{
        const done=checks[t.id]?'done':'';
        const ck=checks[t.id]?'✓':'';
        body+=`<div class="routine-item morning ${done}" onclick="toggle('${t.id}',${day.day})">
          <span class="r-icon">☀️</span>
          <span class="r-text">${getTaskLabel(t)}</span>
          <span class="task-badge b-morn">아침</span>
          <div class="routine-check">${ck}</div>
        </div>`;
      });
    }

    body+=`<div class="section-label">📖 새 진도</div>`;
    newT.forEach(t=>{
      const done=checks[t.id]?'done':'';
      const ck=checks[t.id]?'✓':'';
      const isCustom = !!(unitNames && unitNames[t.unitNum]);
      body+=`<div class="task-item ${done}" onclick="toggle('${t.id}',${day.day})">
        <div class="task-checkbox">${ck}</div>
        <div class="task-text" id="unit-name-${t.unitNum}">${getUnitName(t.unitNum)} ${t.suffix}${isCustom ? ' <span class="unit-custom-badge">수정됨</span>' : ''}</div>
        <button class="unit-edit-btn" onclick="startEditUnitName(${t.unitNum},event)" title="이름 수정">✏️</button>
        <span class="task-badge b-new">NEW</span>
      </div>`;
    });

    if(revT.length){
      body+=`<div class="section-label">🔁 복습</div>`;
      revT.forEach(t=>{
        const done=checks[t.id]?'done':'';
        const ck=checks[t.id]?'✓':'';
        const bl={r1:'1차',r2:'2차',r3:'3차'}[t.type];
        const bc={r1:'b-r1',r2:'b-r2',r3:'b-r3'}[t.type];
        body+=`<div class="task-item ${done}" onclick="toggle('${t.id}',${day.day})">
          <div class="task-checkbox">${ck}</div>
          <div class="task-text">${getTaskLabel(t)}</div>
          <span class="task-badge ${bc}">${bl}</span>
        </div>`;
      });
    }

    const mv=(memos[day.day]||'');
    const mc=mv.length?mv.length+'자':'';
    body+=`<div class="memo-wrap">
      <div class="section-label">📝 오늘의 메모</div>
      <textarea class="memo-textarea" id="memo-${day.day}"
        placeholder="오늘 공부 내용, 어려웠던 점, 핵심 개념을 자유롭게 적어보세요 🌿"
        oninput="updateMemoCount(${day.day})"
      >${mv}</textarea>
      <div class="memo-footer">
        <button class="memo-save-btn" onclick="saveMemo(${day.day})">저장</button>
        <span class="memo-saved" id="msaved-${day.day}">✓ 저장됨</span>
        <span class="memo-count" id="mcount-${day.day}">${mc}</span>
      </div>
    </div>`;

    bedT.forEach(t=>{
      const done=checks[t.id]?'done':'';
      const ck=checks[t.id]?'✓':'';
      body+=`<div class="routine-item bed ${done}" onclick="toggle('${t.id}',${day.day})">
        <span class="r-icon">🌙</span>
        <span class="r-text">${getTaskLabel(t)}</span>
        <span class="task-badge b-bed">취침전</span>
        <div class="routine-check">${ck}</div>
      </div>`;
    });

    return `<div class="day-card ${cc} ${oc}" id="card-${day.day}">
      <div class="day-header" onclick="toggleCard(${day.day})">
        <div class="day-num-badge ${wc(day.day)}">${day.day}</div>
        <div class="day-info">
          <div class="day-title">Day ${day.day}
            <span style="color:var(--brown-l);font-weight:400;font-size:11px"> — ${wlb(day.day)}</span>
          </div>
          <div class="day-sub" id="dsub-${day.day}">${doneC}/${totalC} 완료</div>
        </div>
        <span class="day-status-icon" id="dicon-${day.day}">${icon}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="day-body">${body}</div>
    </div>`;
  }

  // ── 인터랙션 ─────────────────────────────────────
  window.toggleCard = function(d){
    opens[d]=!opens[d];
    const card=document.getElementById('card-'+d);
    card.classList.toggle('open',opens[d]);
    saveToFirestore();
  };

  window.toggle = function(tid,dayNum){
    checks[tid]=!checks[tid];
    refreshCard(dayNum);
    updateProgress(); updateStats(); updateCalendar();
    showToast(checks[tid]?'✅ 완료!':'↩ 취소됨');
    saveToFirestore();
  };

  function refreshCard(dayNum){
    const day=DAYS.find(d=>d.day===dayNum);
    const card=document.getElementById('card-'+dayNum);
    if(!card) return;
    const wasOpen=card.classList.contains('open');
    const tmp=document.createElement('div');
    tmp.innerHTML=renderCard(day);
    const newCard=tmp.firstElementChild;
    if(wasOpen) newCard.classList.add('open');
    card.replaceWith(newCard);
  }

  // ── Unit 이름 인라인 편집 ──────────────────────────────────────────
  // 이름 변경 시 영향받는 날: N(new+bed), N+1(morn), N+3(r1), N+6(r2), N+13(r3)
  function refreshAffectedDays(unitNum) {
    const affectedDays = [unitNum, unitNum+1, unitNum+3, unitNum+6, unitNum+13]
      .filter(d => d >= 1 && d <= 30);
    affectedDays.forEach(dayNum => {
      const day = DAYS.find(d => d.day === dayNum);
      const card = document.getElementById('card-'+dayNum);
      if(!card || !day) return;
      const wasOpen = card.classList.contains('open');
      const tmp = document.createElement('div');
      tmp.innerHTML = renderCard(day);
      const newCard = tmp.firstElementChild;
      if(wasOpen) newCard.classList.add('open');
      card.replaceWith(newCard);
    });
  }

  window.startEditUnitName = function(unitNum, event) {
    event.stopPropagation();
    const textEl = document.getElementById('unit-name-'+unitNum);
    if(!textEl) return;
    if(textEl.querySelector('input')) return; // 이미 편집 중
    const currentName = getUnitName(unitNum);
    textEl.className = 'unit-name-wrap';
    textEl.innerHTML =
      `<input id="unit-name-input-${unitNum}" class="unit-name-input" type="text"
         value="${currentName.replace(/"/g,'&quot;')}"
         placeholder="이름을 입력하세요"
         onkeydown="handleUnitNameKey(event,${unitNum})"
         onclick="event.stopPropagation()"
       />
       <button class="unit-confirm-btn"
         onclick="confirmUnitName(${unitNum});event.stopPropagation()">
         저장
       </button>`;
    const inp = document.getElementById('unit-name-input-'+unitNum);
    if(inp){ inp.focus(); inp.select(); }
  };

  window.handleUnitNameKey = function(event, unitNum) {
    event.stopPropagation();
    if(event.key === 'Enter')  { event.preventDefault(); confirmUnitName(unitNum); }
    if(event.key === 'Escape') { refreshAffectedDays(unitNum); }
  };

  window.confirmUnitName = function(unitNum) {
    const input = document.getElementById('unit-name-input-'+unitNum);
    if(!input) return;
    const newName = input.value.trim();
    if(newName && newName !== `Unit ${unitNum}`) {
      unitNames[unitNum] = newName;
    } else {
      delete unitNames[unitNum];
    }
    LC('unitNames', unitNames);
    saveToFirestore();
    showToast('✏️ 이름 변경! 연결된 복습도 업데이트됨');
    refreshAffectedDays(unitNum);
  };

  window.saveMemo = function(d){
    const ta=document.getElementById('memo-'+d); if(!ta) return;
    memos[d]=ta.value;
    const s=document.getElementById('msaved-'+d);
    if(s){s.style.display='inline';setTimeout(()=>s.style.display='none',1800);}
    updateStats(); updateCalendar();
    showToast('📝 메모 저장됨');
    saveToFirestore();
  };

  window.updateMemoCount = function(d){
    const ta=document.getElementById('memo-'+d);
    const mc=document.getElementById('mcount-'+d);
    if(ta&&mc) mc.textContent=ta.value.length?ta.value.length+'자':'';
  };

  // ── 진행률 ───────────────────────────────────────
  function updateProgress(){
    let total=0,done=0;
    DAYS.forEach(day=>mainTasks(day).forEach(t=>{total++;if(checks[t.id])done++;}));
    const pct=total?Math.round(done/total*100):0;
    document.getElementById('prog-pct').textContent=pct+'%';
    document.getElementById('prog-text').textContent=`전체 진행률 (${done}/${total})`;
    document.getElementById('prog-fill').style.width=pct+'%';
  }

  // ── 통계 ─────────────────────────────────────────
  function updateStats(){
    let doneDays=0,totalTasks=0,memoCnt=0;
    DAYS.forEach(day=>{
      if(getDayStatus(day)==='complete') doneDays++;
      mainTasks(day).forEach(t=>{if(checks[t.id])totalTasks++;});
    });
    Object.values(memos).forEach(m=>{if(m&&m.trim())memoCnt++;});
    let streak=0;
    for(let i=0;i<DAYS.length;i++){if(getDayStatus(DAYS[i])==='complete')streak++;else break;}
    document.getElementById('s-streak').textContent=streak;
    document.getElementById('s-done').textContent=doneDays;
    document.getElementById('s-tasks').textContent=totalTasks;
    document.getElementById('s-memos').textContent=memoCnt;
    document.getElementById('s-remain').textContent=30-doneDays;
  }

  // ── 달력 ─────────────────────────────────────────
  function updateCalendar(){
    const hEl=document.getElementById('cal-h');
    if(hEl&&!hEl.children.length){
      hEl.innerHTML=['월','화','수','목','금','토','일'].map(h=>`<div class="cal-hcell">${h}</div>`).join('');
    }
    const grid=document.getElementById('cal-g'); if(!grid) return;
    grid.innerHTML=DAYS.map(day=>{
      const s=getDayStatus(day);
      const cls=s==='complete'?'cc':s==='partial'?'cp':'ce';
      const dot=memos[day.day]&&memos[day.day].trim()?'<div class="cal-dot"></div>':'';
      return `<div class="cal-cell ${cls}" onclick="jumpToDay(${day.day})">${day.day}${dot}</div>`;
    }).join('');
  }

  window.jumpToDay = function(d){
    switchTab('plan',null,'nb-plan');
    opens[d]=true;
    setTimeout(()=>{
      renderDays();
      document.getElementById('card-'+d)?.scrollIntoView({behavior:'smooth',block:'center'});
    },80);
  };

  // ── 탭 전환 ──────────────────────────────────────
  window.switchTab = function(name,dtBtn,nbId){
    document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
    if(dtBtn) dtBtn.classList.add('active');
    else{ const m={plan:0,stats:1,calendar:2}; document.querySelectorAll('.dtab')[m[name]]?.classList.add('active'); }
    ['nb-plan','nb-stats','nb-calendar'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
    if(nbId) document.getElementById(nbId)?.classList.add('active');
    else{ const m={plan:'nb-plan',stats:'nb-stats',calendar:'nb-calendar'}; document.getElementById(m[name])?.classList.add('active'); }
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+name)?.classList.add('active');
    if(name==='stats')    updateStats();
    if(name==='calendar') updateCalendar();
  };

  // ── 내보내기 / 가져오기 ──────────────────────────
  window.exportData = function(){
    const data={checks,memos,opens,unitNames,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url;
    a.download=`study_planner_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast('📤 백업 완료!');
  };

  window.triggerImport = function(){
    const input=document.createElement('input'); input.type='file'; input.accept='.json';
    input.onchange=e=>{
      const file=e.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(confirm('가져온 데이터로 덮어쓸까요?')){
            checks=data.checks||{}; memos=data.memos||{}; opens=data.opens||{}; unitNames=data.unitNames||{};
            saveToFirestore();
            renderDays(); updateStats(); updateCalendar();
            showToast('📥 복원 완료! Firebase에도 업로드됨');
          }
        }catch{ showToast('❌ 파일 오류'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  window.confirmReset = function(){
    if(confirm('⚠️ 모든 체크·메모가 삭제됩니다. Firebase 데이터도 초기화됩니다. 계속할까요?')){
      checks={}; memos={}; opens={}; unitNames={};
      saveToFirestore();
      renderDays(); updateStats(); updateCalendar();
      showToast('🗑 초기화 완료');
    }
  };

  // ── Toast ─────────────────────────────────────────
  let toastTimer;
  window.showToast = function(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
  };
  function showToast(msg){ window.showToast(msg); }

  // ── 초기 실행: 로컬 캐시 먼저 표시 후 Firebase 연결 ──
  const cc=LC('checks'); const mm=LC('memos'); const oo=LC('opens'); const un2=LC('unitNames');
  if(cc) checks=cc; if(mm) memos=mm; if(oo) opens=oo; if(un2) unitNames=un2;
  renderDays(); updateStats(); updateCalendar();

  // Firebase 실시간 리스너 시작
  startListener();

</script>
</body>
</html>
